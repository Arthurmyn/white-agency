[build]
  publish = "public"
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

# All /api/* calls → our Express function (no :splat — preserves full path)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200

# /admin → static admin.html
[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200
